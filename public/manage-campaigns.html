<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏰 Manage Campaigns</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;1,400&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #13100b;
            --surface: #1e1810;
            --surface2: #272015;
            --border: #3d3220;
            --border2: #554428;
            --gold: #c9a84c;
            --gold-dim: #7a6030;
            --text: #e8dcc0;
            --text-dim: #a09070;
            --fd: 'Cinzel', 'Georgia', serif;
            --fb: 'Crimson Text', 'Georgia', serif;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--fb);
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            display: flex;
            flex-direction: column;
        }


        .app-header {
            background: var(--surface);
            border-bottom: 2px solid var(--gold-dim);
            padding: 7px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .5);
        }

        .app-title {
            font-family: var(--fd);
            font-size: .95rem;
            color: var(--gold);
            letter-spacing: .08em;
        }

        .hdr-r {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto
        }

        .theme-sw {
            display: flex;
            gap: 4px;
            align-items: center
        }

        .theme-sw button {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: border-color .15s, transform .1s;
            flex-shrink: 0
        }

        .theme-sw button:hover {
            transform: scale(1.2)
        }

        .theme-sw button.act {
            border-color: var(--gold) !important
        }

        .theme-sw button[data-t="dark"] {
            background: #272015;
            border-color: #554428
        }

        .theme-sw button[data-t="light"] {
            background: #f0ece0;
            border-color: #b8a888
        }

        .theme-sw button[data-t="slate"] {
            background: #1c2128;
            border-color: #444c56
        }

        .back-btn {
            background: var(--gold-dim);
            color: var(--text);
            border: none;
            padding: 6px 12px;
            border-radius: 2px;
            font-family: var(--fd);
            font-size: .7rem;
            letter-spacing: .06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .15s;
        }

        .back-btn:hover {
            background: var(--gold);
            color: var(--bg);
        }

        .container {
            flex: 1;
            overflow: auto;
            padding: 16px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 16px;
        }

        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .section-header {
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            padding: 12px 14px;
            font-family: var(--fd);
            font-size: .75rem;
            color: var(--gold);
            letter-spacing: .08em;
            text-transform: uppercase;
        }

        .section-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .campaign-item {
            padding: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 2px;
            cursor: pointer;
            transition: all .15s;
            margin-bottom: 8px;
        }

        .campaign-item:hover {
            background: var(--surface3);
            border-color: var(--gold-dim);
        }

        .campaign-item.active {
            background: var(--gold-dim);
            color: var(--bg);
            border-color: var(--gold);
        }

        .campaign-name {
            font-weight: bold;
            font-size: 13px;
        }

        .campaign-desc {
            font-size: 11px;
            margin-top: 4px;
            opacity: .8;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            font-size: .7rem;
            color: var(--text-dim);
            margin-bottom: 3px;
            font-family: var(--fd);
            letter-spacing: .04em;
            text-transform: uppercase;
        }

        input,
        textarea,
        select {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border2);
            color: var(--text);
            padding: 6px 8px;
            border-radius: 2px;
            font-family: var(--fb);
            font-size: 13px;
            transition: border-color .15s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--gold-dim);
        }

        button {
            background: var(--gold-dim);
            color: var(--text);
            border: none;
            padding: 6px 10px;
            border-radius: 2px;
            font-family: var(--fd);
            font-size: .7rem;
            letter-spacing: .06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .15s;
            width: 100%;
            margin-top: 6px;
        }

        button:hover {
            background: var(--gold);
            color: var(--bg);
        }

        button.danger {
            background: #8b3a3a;
        }

        button.danger:hover {
            background: #a83a3a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        th {
            background: var(--surface2);
            padding: 8px;
            text-align: left;
            color: var(--gold);
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover {
            background: var(--surface2);
        }

        .empty-state {
            padding: 20px;
            text-align: center;
            color: var(--text-dim);
            font-style: italic;
        }

        .action-buttons {
            display: flex;
            gap: 4px;
        }

        .action-buttons button {
            flex: 1;
            margin: 0;
            padding: 4px 6px;
            font-size: .65rem;
            width: auto;
        }

        .message {
            padding: 8px;
            border-radius: 2px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .message.success {
            background: #1f3d1a;
            color: #9fd49f;
            border: 1px solid #3d5a3a;
        }

        .message.error {
            background: #3d1f1f;
            color: #d49f9f;
            border: 1px solid #5a3d3d;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="/header-component.js"></script>
</head>

<body>
    <div class="app-header">
        <div class="app-title">🏰 Manage Campaigns</div>
        <div class="hdr-r">
            <div class="theme-sw" id="themeSw">
                <button data-t="dark" title="Dark">◐</button>
                <button data-t="light" title="Light">◯</button>
                <button data-t="slate" title="Slate">◭</button>
            </div>
            <button class="back-btn" onclick="location.href='/'">← Back</button>
            <div id="userMenuMount"></div>
        </div>
    </div>

    <div class="container">
        <!-- Campaigns List -->
        <div class="section">
            <div class="section-header">Campaigns</div>
            <div class="section-body">
                <div id="createMessage"></div>
                <form onsubmit="handleCreateCampaign(event)">
                    <div class="form-group">
                        <label>Campaign Name</label>
                        <input type="text" id="campaignName" placeholder="e.g., Lost Mines" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="campaignDesc" placeholder="Brief description..." rows="3"></textarea>
                    </div>
                    <button type="submit">Create Campaign</button>
                </form>

                <div id="campaignsList" style="margin-top: 16px;"></div>
            </div>
        </div>

        <!-- Campaign Details -->
        <div class="section">
            <div class="section-header" id="detailsHeader">Select a Campaign</div>
            <div class="section-body" id="campaignDetails">
                <div class="empty-state">Select a campaign to manage players and details</div>
            </div>
        </div>
    </div>

    <script>
        let campaigns = [];
        let currentCampaign = null;

        async function loadCampaigns() {
            initHeaderComponent('userMenuMount');
            await loadUsers();
            try {
                const response = await fetch('/api/campaigns');
                campaigns = await response.json();
                renderCampaignList();
            } catch (error) {
                console.error('Error loading campaigns:', error);
            }
        }

        function renderCampaignList() {
            const list = document.getElementById('campaignsList');

            if (campaigns.length === 0) {
                list.innerHTML = '<div class="empty-state">No campaigns yet</div>';
                return;
            }

            list.innerHTML = campaigns.map(c => `
                <div class="campaign-item ${currentCampaign?.id === c.id ? 'active' : ''}" 
                     onclick="selectCampaign(${c.id})">
                    <div class="campaign-name">${c.name}</div>
                    <div class="campaign-desc">${c.description || 'No description'}</div>
                </div>
            `).join('');
        }

        function selectCampaign(campaignId) {
            currentCampaign = campaigns.find(c => c.id === campaignId);
            renderCampaignList();
            renderCampaignDetails();
        }

        async function handleCreateCampaign(event) {
            event.preventDefault();
            const name = document.getElementById('campaignName').value;
            const description = document.getElementById('campaignDesc').value;
            const msg = document.getElementById('createMessage');

            try {
                const response = await fetch('/api/campaigns', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description })
                });

                if (response.ok) {
                    const campaign = await response.json();
                    msg.innerHTML = '<div class="message success">✓ Campaign created</div>';
                    document.getElementById('campaignName').value = '';
                    document.getElementById('campaignDesc').value = '';
                    loadCampaigns();
                    setTimeout(() => msg.innerHTML = '', 2000);
                } else {
                    const error = await response.json();
                    msg.innerHTML = `<div class="message error">✗ ${error.error}</div>`;
                }
            } catch (error) {
                msg.innerHTML = `<div class="message error">✗ Error: ${error.message}</div>`;
            }
        }

        let allUsers = [];

        async function loadUsers() {
            try {
                const response = await fetch('/api/users');
                if (response.ok) {
                    allUsers = await response.json();
                }
            } catch (e) {
                allUsers = [];
            }
        }

        async function loadTimelines(campaignId) {
            try {
                const response = await fetch(`/api/timeline/${campaignId}`);
                if (response.ok) return await response.json();
            } catch (e) { }
            return [];
        }

        async function renderCampaignDetails() {
            if (!currentCampaign) return;

            const details = document.getElementById('campaignDetails');
            document.getElementById('detailsHeader').textContent = `📋 ${currentCampaign.name}`;

            try {
                const [playersResponse, timelines, locationsRes, metaRes] = await Promise.all([
                    fetch(`/api/campaigns/${currentCampaign.id}/players`),
                    loadTimelines(currentCampaign.id),
                    fetch(`/api/campaigns/${currentCampaign.id}/locations`),
                    fetch(`/api/campaigns/${currentCampaign.id}/meta`)
                ]);

                let players = [];
                if (playersResponse.ok) {
                    const data = await playersResponse.json();
                    players = Array.isArray(data) ? data : [];
                } else {
                    const err = await playersResponse.json().catch(() => ({}));
                    details.innerHTML = `<div class="message error">Error loading players: ${err.error || playersResponse.statusText}</div>`;
                    return;
                }

                const locations = locationsRes.ok ? await locationsRes.json() : [];
                const meta = metaRes.ok ? await metaRes.json() : {};

                const userOptions = allUsers
                    .filter(u => u.role === 'player')
                    .map(u => `<option value="${u.id}">${u.username}</option>`)
                    .join('');

                const timelineHtml = timelines.length === 0
                    ? '<div class="empty-state">No timeline entries for this campaign</div>'
                    : `<table>
                        <thead><tr><th>Date</th><th>Title</th><th>Type</th></tr></thead>
                        <tbody>
                        ${timelines.map(t => `
                            <tr>
                                <td>${t.date || '—'}</td>
                                <td>${t.title}</td>
                                <td><span style="color:var(--gold-dim);font-size:11px;">${t.type}</span></td>
                            </tr>
                        `).join('')}
                        </tbody>
                    </table>`;

                const locationsHtml = locations.length === 0
                    ? '<div class="empty-state" style="padding:10px;">No locations yet</div>'
                    : `<table>
                        <thead><tr><th>Name</th><th>Description</th><th></th></tr></thead>
                        <tbody>
                        ${locations.map(l => `
                            <tr>
                                <td><strong>${escHtml(l.name)}</strong></td>
                                <td style="font-size:11px;color:var(--text-dim);">${escHtml(l.description || '')}</td>
                                <td><button class="danger" style="width:auto;padding:3px 6px;margin:0;font-size:.6rem;"
                                            onclick="deleteLocation(${l.id})">Delete</button></td>
                            </tr>`).join('')}
                        </tbody>
                    </table>`;

                details.innerHTML = `
                    <div id="playersMessage"></div>

                    <div class="form-group">
                        <label>Add Player to Campaign</label>
                        <input type="text" id="playerName" placeholder="Character name" style="margin-bottom:6px;">
                        <label>Assign User (optional)</label>
                        <select id="playerUserId">
                            <option value="">— No user assigned —</option>
                            ${userOptions}
                        </select>
                        <button onclick="handleCreatePlayer()">Add Player</button>
                    </div>

                    <h3 style="margin-top:16px;font-size:13px;color:var(--gold);margin-bottom:8px;">
                        Players (${players.length})
                    </h3>
                    ${players.length === 0
                        ? '<div class="empty-state">No players yet</div>'
                        : `<table>
                            <thead><tr><th>Character</th><th>User</th><th>Actions</th></tr></thead>
                            <tbody>
                                ${players.map(p => `
                                    <tr>
                                        <td>${p.player_name}</td>
                                        <td>${p.username || '—'}</td>
                                        <td><button class="danger" style="width:auto;padding:3px 6px;margin:0;"
                                                    onclick="deletePlayer(${currentCampaign.id}, ${p.id})">Delete</button></td>
                                    </tr>`).join('')}
                            </tbody>
                        </table>`}

                    <h3 style="margin-top:20px;font-size:13px;color:var(--gold);margin-bottom:8px;">
                        📍 Today Marker
                    </h3>
                    <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px;">
                        <input type="text" id="todayMarkerInput" value="${escHtml(meta.today_marker || '')}"
                               placeholder="e.g., Day 47, 15th of Harvest Moon…"
                               style="flex:1;font-size:12px;padding:5px 7px;">
                        <button onclick="saveTodayMarker()" style="width:auto;padding:5px 10px;margin:0;font-size:.65rem;">Save</button>
                    </div>
                    <div id="todayMsg" style="font-size:11px;"></div>

                    <h3 style="margin-top:20px;font-size:13px;color:var(--gold);margin-bottom:8px;">
                        🗺️ Locations (${locations.length})
                    </h3>
                    <div style="display:flex;gap:6px;margin-bottom:8px;">
                        <input type="text" id="locNameInput" placeholder="Location name" style="flex:1;font-size:12px;padding:5px 7px;">
                        <input type="text" id="locDescInput" placeholder="Short description" style="flex:2;font-size:12px;padding:5px 7px;">
                        <button onclick="handleCreateLocation()" style="width:auto;padding:5px 10px;margin:0;font-size:.65rem;">Add</button>
                    </div>
                    <div id="locMsg" style="font-size:11px;margin-bottom:6px;"></div>
                    ${locationsHtml}

                    <h3 style="margin-top:20px;font-size:13px;color:var(--gold);margin-bottom:8px;">
                        📜 Timeline Entries (${timelines.length})
                    </h3>
                    ${timelineHtml}

                    <div style="margin-top:12px;">
                        <button onclick="window.location.href='/timeline?campaign=${currentCampaign.id}'" style="background:var(--surface2);border:1px solid var(--border2);">
                            Open Timeline Editor →
                        </button>
                        <button class="danger" style="margin-top:6px;" onclick="deleteCampaign(${currentCampaign.id})">
                            Delete Campaign
                        </button>
                    </div>
                `;
            } catch (error) {
                details.innerHTML = `<div class="message error">Error loading campaign details: ${error.message}</div>`;
            }
        }

        async function handleCreatePlayer() {
            const name = document.getElementById('playerName').value.trim();
            const userId = document.getElementById('playerUserId').value || null;
            if (!name) return;

            try {
                const response = await fetch(`/api/campaigns/${currentCampaign.id}/players`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, userId })
                });

                if (response.ok) {
                    document.getElementById('playerName').value = '';
                    renderCampaignDetails();
                    const msg = document.getElementById('playersMessage');
                    msg.innerHTML = '<div class="message success">✓ Player added</div>';
                    setTimeout(() => msg.innerHTML = '', 2000);
                } else {
                    const error = await response.json();
                    document.getElementById('playersMessage').innerHTML =
                        `<div class="message error">✗ ${error.error}</div>`;
                }
            } catch (error) {
                document.getElementById('playersMessage').innerHTML =
                    `<div class="message error">✗ Error: ${error.message}</div>`;
            }
        }

        async function deletePlayer(campaignId, playerId) {
            if (!confirm('Delete this player?')) return;

            try {
                await fetch(`/api/campaigns/${campaignId}/players/${playerId}`, {
                    method: 'DELETE'
                });
                renderCampaignDetails();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function deleteCampaign(campaignId) {
            if (!confirm('Delete campaign and all its data?')) return;

            try {
                await fetch(`/api/campaigns/${campaignId}`, {
                    method: 'DELETE'
                });
                currentCampaign = null;
                loadCampaigns();
                document.getElementById('campaignDetails').innerHTML =
                    '<div class="empty-state">Campaign deleted</div>';
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function escHtml(str) {
            return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        async function saveTodayMarker() {
            const value = document.getElementById('todayMarkerInput').value.trim();
            const msgEl = document.getElementById('todayMsg');
            try {
                const res = await fetch(`/api/campaigns/${currentCampaign.id}/meta`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ today_marker: value })
                });
                if (res.ok) {
                    msgEl.innerHTML = '<span style="color:#9fd49f;">✓ Saved</span>';
                    setTimeout(() => msgEl.innerHTML = '', 2000);
                } else {
                    const e = await res.json();
                    msgEl.innerHTML = `<span style="color:#d49f9f;">✗ ${e.error || 'Error'}</span>`;
                }
            } catch (e) {
                msgEl.innerHTML = `<span style="color:#d49f9f;">✗ ${e.message}</span>`;
            }
        }

        async function handleCreateLocation() {
            const name = (document.getElementById('locNameInput').value || '').trim();
            const desc = (document.getElementById('locDescInput').value || '').trim();
            const msgEl = document.getElementById('locMsg');
            if (!name) return;
            try {
                const res = await fetch(`/api/campaigns/${currentCampaign.id}/locations`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description: desc })
                });
                if (res.ok) {
                    renderCampaignDetails();
                } else {
                    const e = await res.json();
                    msgEl.innerHTML = `<span style="color:#d49f9f;">✗ ${e.error || 'Error'}</span>`;
                }
            } catch (e) {
                msgEl.innerHTML = `<span style="color:#d49f9f;">✗ ${e.message}</span>`;
            }
        }

        async function deleteLocation(locationId) {
            if (!confirm('Delete this location?')) return;
            try {
                await fetch(`/api/campaigns/${currentCampaign.id}/locations/${locationId}`, { method: 'DELETE' });
                renderCampaignDetails();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        loadCampaigns();
    </script>
</body>

</html>
