      document.getElementById('connMsg').innerHTML = '';
      fromSel.innerHTML = opts;
      toSel.innerHTML = opts;

      if (!isEdit) {
        // When "From" changes, remove that option from "To" to prevent same-entity connections
        fromSel.onchange = () => {
          const selected = fromSel.value;
          toSel.innerHTML = opts;
          const toOpt = toSel.querySelector(`option[value="${CSS.escape(selected)}"]`);
          if (toOpt) toOpt.remove();
          if (toSel.value === selected) toSel.selectedIndex = 0;
        };
        fromSel.dispatchEvent(new Event('change'));
      }
      document.getElementById('addConnOverlay').classList.add('open');
      setTimeout(() => document.getElementById('connLabel').focus(), 60);
    }

    function openAddConn() {
      _editConnId = null;
      document.getElementById('connLabel').value = '';
      document.getElementById('connNotes').value = '';
      _openConnModal(false);
    }

    function openEditConn(id, label, notes, fromKey, toKey) {
      _editConnId = id;
      document.getElementById('connLabel').value = label;
      document.getElementById('connNotes').value = notes;
      _openConnModal(true);
    }

    function closeAddConn() {
      document.getElementById('addConnOverlay').classList.remove('open');
      _editConnId = null;
    }

    async function saveConn() {
      const label = document.getElementById('connLabel').value.trim();
      const notes = document.getElementById('connNotes').value.trim();
      if (!label) { document.getElementById('connMsg').innerHTML = '<div class="msg err">✗ Label required</div>'; return; }

      try {
        if (_editConnId) {
          // Edit mode — PATCH label and notes only
          const res = await fetch(`/api/campaigns/${currentCampaign.id}/char-tree/connections/${_editConnId}`, {
            method: 'PATCH', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ label, notes: notes || null })
          });
          if (res.ok) { closeAddConn(); await loadCharTree(); }
          else { const e = await res.json(); document.getElementById('connMsg').innerHTML = `<div class="msg err">✗ ${esc(e.error)}</div>`; }
        } else {
          // Add mode — POST new connection
          const from_rel_id = document.getElementById('connFrom').value;
          const to_rel_id = document.getElementById('connTo').value;
          if (from_rel_id === to_rel_id) { document.getElementById('connMsg').innerHTML = '<div class="msg err">✗ From and To must differ</div>'; return; }
          const res = await fetch(`/api/campaigns/${currentCampaign.id}/char-tree/connections`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ from_rel_id, to_rel_id, label, notes: notes || null })
          });
          if (res.ok) { closeAddConn(); await loadCharTree(); }
          else { const e = await res.json(); document.getElementById('connMsg').innerHTML = `<div class="msg err">✗ ${esc(e.error)}</div>`; }
        }
      } catch (e) { document.getElementById('connMsg').innerHTML = `<div class="msg err">✗ ${esc(e.message)}</div>`; }
    }

    async function deleteConn(id) {
      if (!confirm('Delete this DM connection?')) return;
      const res = await fetch(`/api/campaigns/${currentCampaign.id}/char-tree/connections/${id}`, { method: 'DELETE' });
      if (res.ok) await loadCharTree();
    }

    async function toggleConnVisibility(id, btn) {
      const res = await fetch(`/api/campaigns/${currentCampaign.id}/char-tree/connections/${id}/visibility`, { method: 'PATCH' });
      if (!res.ok) return;
      const { is_public } = await res.json();
      // Re-render the whole list so the DM-only label also updates
      await loadCharTree();
    }

    // ═══ CAMPAIGN ACTIONS ════════════════════════════════════════════════
    async function deleteCampaign() {
      if (!confirm(`Delete "${currentCampaign.name}" and ALL its data? This cannot be undone.`)) return;
      await fetch(`/api/campaigns/${currentCampaign.id}`, { method: 'DELETE' });
      currentCampaign = null; document.getElementById('exportCampBtn').style.display = 'none';
      document.getElementById('detailHead').textContent = 'Select a Campaign';
      document.getElementById('detailBody').innerHTML = '<div class="empty" style="padding:40px">Campaign deleted.</div>';
      await loadCampaigns();
    }
    async function exportCampaign() {
      if (!currentCampaign) return;
      try {
        const res = await fetch(`/api/campaigns/${currentCampaign.id}/export`);
        if (!res.ok) { const e = await res.json(); showMsg('createMsg', '✗ ' + e.error, 'err'); return; }
        const data = await res.json();
        const slug = (currentCampaign.name || 'campaign').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
        a.download = `campaign-${slug}.json`; a.click(); URL.revokeObjectURL(a.href);
      } catch (e) { showMsg('createMsg', '✗ ' + e.message, 'err'); }
    }
    async function importCampaign(input) {
      const file = input.files[0]; if (!file) return; input.value = '';
      let bundle; try { bundle = JSON.parse(await file.text()); } catch { showMsg('createMsg', '✗ Invalid JSON', 'err'); return; }
      if (bundle.type !== 'campaign') { showMsg('createMsg', '✗ Not a campaign export', 'err'); return; }
      try {
        const res = await fetch('/api/campaigns/import', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(bundle) });
        const data = await res.json();
        if (res.ok) { showMsg('createMsg', '✓ Imported', 'ok'); await loadCampaigns(); selectCampaign(data.campaign_id); }
        else showMsg('createMsg', '✗ ' + data.error, 'err');
      } catch (e) { showMsg('createMsg', '✗ ' + e.message, 'err'); }
    }

    // ═══ UTIL ════════════════════════════════════════════════════════════
    function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    function showMsg(id, text, type) {
      const el = document.getElementById(id); if (!el) return;
      el.innerHTML = `<div class="msg ${type}">${text}</div>`;
      setTimeout(() => { if (el) el.innerHTML = ''; }, 3000);
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeCalPicker(); closeNewTlModal(); closeEditLoc(); closeAddConn(); }
      if (e.key !== 'Enter') return;
      const t = e.target.id;
      if (t === 'campaignName' || t === 'campaignDesc') handleCreateCampaign();
      if (t === 'playerName') addPlayer();
      if (t === 'locName' || t === 'locDesc') addLocation();
      if (t === 'npcNames') addNpcs();
      if (t === 'newTlName') confirmNewTl();
      if (t === 'connLabel') saveConn();
      if (t === 'editLocName') saveEditLoc();
    });

    init();
  </script>
</body>

</html>
