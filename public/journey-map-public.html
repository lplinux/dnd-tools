<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🗺️ Journey Map</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;1,400&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #13100b;
      --surface: #1e1810;
      --surface2: #272015;
      --surface3: #30281a;
      --border: #3d3220;
      --border2: #554428;
      --gold: #c9a84c;
      --gold-dim: #7a6030;
      --text: #e8dcc0;
      --text-dim: #a09070;
      --text-muted: #6a5a40;
      --fd: 'Cinzel', 'Georgia', serif;
      --fb: 'Crimson Text', 'Georgia', serif;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--fb);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      display: flex;
      flex-direction: column;
    }

    .app-header {
      background: var(--surface);
      border-bottom: 2px solid var(--gold-dim);
      padding: 7px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .5);
    }

    .app-title {
      font-family: var(--fd);
      font-size: .9rem;
      color: var(--gold);
      letter-spacing: .08em;
    }

    .map-name {
      font-size: .8rem;
      color: var(--text-dim);
      font-style: italic;
    }

    .pub-badge {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text-muted);
      padding: 3px 8px;
      border-radius: 2px;
      font-family: var(--fd);
      font-size: .6rem;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .hdr-r {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 260px;
      overflow: hidden;
    }

    /* Map area */
    .map-area {
      position: relative;
      overflow: hidden;
      background: #0a0807;
      cursor: grab;
    }

    .map-area:active {
      cursor: grabbing;
    }

    .map-viewport {
      position: absolute;
      transform-origin: 0 0;
    }

    .map-img {
      display: block;
      pointer-events: none;
      user-select: none;
    }

    .map-svg {
      position: absolute;
      top: 0;
      left: 0;
      overflow: visible;
    }

    .map-empty {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
    }

    .map-empty .icon {
      font-size: 48px;
      opacity: .3;
    }

    .map-empty p {
      font-family: var(--fd);
      font-size: .8rem;
      letter-spacing: .08em;
      opacity: .4;
    }

    .zoom-ctrl {
      position: absolute;
      bottom: 14px;
      right: 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      z-index: 10;
    }

    .zoom-btn {
      width: 28px;
      height: 28px;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 2px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .12s;
    }

    .zoom-btn:hover {
      background: var(--surface3);
      border-color: var(--gold-dim);
    }

    /* SVG styles */
    .pin-g {
      cursor: pointer;
    }

    .pin-g:hover .pin-circle {
      r: 10;
    }

    .pin-g.sel .pin-circle {
      r: 11;
    }

    .region-g { cursor: pointer; }
    .region-poly {
      fill: rgba(80, 120, 60, 0.18);
      stroke: rgba(180, 200, 120, 0.7);
      stroke-width: 1.8;
      stroke-linejoin: round;
      transition: fill 0.15s;
    }
    .region-g:hover .region-poly { fill: rgba(80, 120, 60, 0.30); stroke: rgba(201, 168, 76, 0.9); }
    .region-g.sel .region-poly { fill: rgba(201, 168, 76, 0.22); stroke: #e8c96a; stroke-width: 2.5; }
    .region-label {
      font-family: Cinzel, Georgia, serif;
      font-size: 11px;
      fill: #e8dcc0;
      text-anchor: middle;
      pointer-events: none;
      paint-order: stroke;
      stroke: #13100b;
      stroke-width: 3px;
    }

    /* Hover tooltip */
    .map-tooltip {
      position: fixed;
      z-index: 999;
      pointer-events: none;
      background: #1a130a;
      border: 1px solid #7a6030;
      border-radius: 4px;
      padding: 8px 11px;
      max-width: 240px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, .7);
      font-family: 'Cinzel', Georgia, serif;
      display: none;
    }

    .map-tooltip .tt-name {
      font-size: 13px;
      color: #c9a84c;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .map-tooltip .tt-type {
      font-size: 10px;
      color: #7a6a40;
      text-transform: capitalize;
      margin-bottom: 4px;
    }

    .map-tooltip .tt-desc {
      font-size: 11px;
      color: #a09070;
      line-height: 1.45;
      margin-bottom: 4px;
    }

    .map-tooltip .tt-events {
      margin-top: 5px;
      border-top: 1px solid #3a2e18;
      padding-top: 5px;
    }

    .map-tooltip .tt-event {
      font-size: 10px;
      color: #80a858;
      line-height: 1.4;
    }

    /* Event chip hover tooltip (reuses .map-tooltip styles) */
    .ev-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      color: #80a858;
      background: rgba(80, 120, 50, .12);
      border: 1px solid rgba(80, 120, 50, .3);
      border-radius: 3px;
      padding: 1px 6px;
      margin: 1px 2px;
      cursor: default;
      position: relative;
    }

    .ev-chip:hover {
      background: rgba(80, 120, 50, .22);
    }

    .ev-tooltip {
      position: fixed;
      z-index: 1000;
      pointer-events: none;
      background: #141008;
      border: 1px solid #4a6a30;
      border-radius: 4px;
      padding: 9px 12px;
      max-width: 260px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .8);
      font-family: 'Cinzel', Georgia, serif;
      display: none;
    }

    .ev-tooltip .evt-title {
      font-size: 12px;
      color: #c9a84c;
      font-weight: bold;
      margin-bottom: 5px;
      line-height: 1.3;
    }

    .ev-tooltip .evt-row {
      display: flex;
      gap: 6px;
      font-size: 10px;
      color: #808060;
      line-height: 1.5;
      margin-bottom: 2px;
    }

    .ev-tooltip .evt-row .evt-lbl {
      color: #5a5a40;
      flex-shrink: 0;
    }

    .ev-tooltip .evt-row .evt-val {
      color: #a09878;
    }

    .ev-tooltip .evt-desc {
      font-size: 10px;
      color: #786858;
      line-height: 1.45;
      margin-top: 5px;
      border-top: 1px solid #2a2418;
      padding-top: 5px;
    }

    .pin-label {
      font-family: Cinzel, Georgia, serif;
      font-size: 11px;
      fill: #e8dcc0;
      text-anchor: middle;
      pointer-events: none;
      paint-order: stroke;
      stroke: #13100b;
      stroke-width: 3px;
    }

    .path-dist-label {
      font-family: Cinzel, Georgia, serif;
      font-size: 9px;
      fill: #c9a84c;
      text-anchor: middle;
      pointer-events: none;
      paint-order: stroke;
      stroke: #13100b;
      stroke-width: 2.5px;
    }

    /* Right panel */
    .right-panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .rp-head {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      font-family: var(--fd);
      font-size: .75rem;
      color: var(--gold);
      letter-spacing: .08em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .rp-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .rp-empty {
      color: var(--text-muted);
      font-style: italic;
      font-size: 12px;
      text-align: center;
      padding: 24px 8px;
    }

    /* Info sections */
    .info-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .info-card h3 {
      font-family: var(--fd);
      font-size: .7rem;
      color: var(--gold);
      margin-bottom: 7px;
      letter-spacing: .04em;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
      gap: 8px;
      font-size: 12px;
    }

    .info-row:last-child {
      border: none;
    }

    .info-lbl {
      color: var(--text-dim);
    }

    .info-val {
      color: var(--text);
      font-weight: 600;
      text-align: right;
    }

    .travel-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      margin-top: 8px;
    }

    .travel-badge {
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 5px 4px;
      text-align: center;
    }

    .travel-badge .t-icon {
      font-size: 14px;
      display: block;
    }

    .travel-badge .t-time {
      font-size: 11px;
      color: var(--gold);
      font-weight: 600;
      margin-top: 2px;
    }

    .travel-badge .t-lbl {
      font-size: 10px;
      color: var(--text-muted);
    }

    /* Legend */
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }

    .legend-row:last-child {
      border: none;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .path-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 2px;
      margin-bottom: 5px;
      cursor: pointer;
      transition: border-color .12s;
      font-size: 13px;
    }

    .path-chip:hover {
      border-color: var(--gold-dim);
    }

    .path-chip.sel {
      border-color: var(--gold);
      background: var(--surface3);
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: var(--surface);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px;
    }
  </style>
</head>

<body>

  <div class="app-header">
    <div class="app-title">🗺️ Journey Path Map</div>
    <span class="map-name" id="mapTitle">Loading…</span>
    <span class="pub-badge">👁 Read Only</span>
  </div>

  <div class="layout">
    <!-- MAP -->
    <div class="map-tooltip" id="mapTooltip"></div>
    <div class="ev-tooltip" id="evTooltip"></div>
    <div class="map-area" id="mapArea" onmousedown="panStart(event)" onmousemove="panMove(event)"
      onmouseup="panEnd(event)" onwheel="doWheel(event)" oncontextmenu="return false">
      <div id="mapVp">
        <img id="mapImg" class="map-img" style="display:none" onload="onLoaded()">
        <svg id="mapSvg" class="map-svg" width="800" height="600">
          <defs>
            <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
              <polygon points="0 0, 8 2.5, 0 5" fill="currentColor" opacity=".6" />
            </marker>
          </defs>
          <g id="pathsG"></g>
          <g id="regionsG"></g>
          <g id="pinsG"></g>
        </svg>
      </div>
      <div class="map-empty" id="mapEmpty">
        <div class="icon">🗺️</div>
        <p>Loading map…</p>
      </div>
      <div class="zoom-ctrl">
        <button class="zoom-btn" onclick="zStep(1.2)">+</button>
        <button class="zoom-btn" onclick="zStep(0.8)">−</button>
        <button class="zoom-btn" onclick="zFit()" style="font-size:11px">⊡</button>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="rp-head" id="rpHead">Map Details</div>
      <div class="rp-body" id="rpBody">
        <div class="rp-empty">Loading…</div>
      </div>
    </div>
  </div>

  <script>
    let sc = 1, ox = 0, oy = 0, iw = 800, ih = 600;
    let isPan = false, px0 = 0, py0 = 0, ox0 = 0, oy0 = 0;
    let data = null;
    let selPath = null, selLoc = null;
    const SPEEDS = { walk: 3, horse: 8, fly: 25 };

    async function init() {
      const token = location.pathname.split('/').pop();
      try {
        data = await (await fetch(`/api/journey-map-public/${token}`)).json();
        if (data.error) { document.getElementById('mapEmpty').querySelector('p').textContent = data.error; return; }
        document.getElementById('mapTitle').textContent = data.map.name;
        document.title = '🗺️ ' + data.map.name;
        if (data.map.map_image) {
          const img = document.getElementById('mapImg');
          img.onload = onLoaded;
          img.src = data.map.map_image;
          img.style.display = 'block';
        } else {
          document.getElementById('mapEmpty').querySelector('p').textContent = 'No map image uploaded.';
        }
        renderAll();
        buildSidebar();
      } catch (e) {
        document.getElementById('mapEmpty').querySelector('p').textContent = 'Map not found.';
      }
    }

    function onLoaded() {
      const img = document.getElementById('mapImg');
      iw = img.naturalWidth; ih = img.naturalHeight;
      document.getElementById('mapSvg').setAttribute('width', iw);
      document.getElementById('mapSvg').setAttribute('height', ih);
      document.getElementById('mapVp').style.width = iw + 'px';
      document.getElementById('mapVp').style.height = ih + 'px';
      document.getElementById('mapEmpty').style.display = 'none';
      zFit(); renderAll();
    }

    function applyVp() { document.getElementById('mapVp').style.transform = `translate(${ox}px,${oy}px) scale(${sc})`; }
    function zStep(f) { sc = Math.max(.1, Math.min(10, sc * f)); applyVp(); }
    function zFit() {
      const a = document.getElementById('mapArea');
      sc = Math.min(a.clientWidth / iw, a.clientHeight / ih, 1);
      ox = (a.clientWidth - iw * sc) / 2; oy = (a.clientHeight - ih * sc) / 2; applyVp();
    }
    function panStart(e) { if (e.button !== 0) return; isPan = true; px0 = e.clientX; py0 = e.clientY; ox0 = ox; oy0 = oy; }
    function panMove(e) { if (!isPan) return; ox = ox0 + (e.clientX - px0); oy = oy0 + (e.clientY - py0); applyVp(); }
    function panEnd() { isPan = false; }
    function doWheel(e) {
      e.preventDefault();
      const f = e.deltaY < 0 ? 1.1 : .9, r = document.getElementById('mapArea').getBoundingClientRect();
      const mx = e.clientX - r.left, my = e.clientY - r.top;
      ox = mx - (mx - ox) * f; oy = my - (my - oy) * f; sc = Math.max(.1, Math.min(10, sc * f)); applyVp();
    }

    function pctToSvg(px, py) { return { x: px * iw / 100, y: py * ih / 100 }; }
    function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function fmtTime(hrs) {
      if (hrs < 1) return Math.round(hrs * 60) + 'min';
      if (hrs < 24) return hrs.toFixed(1) + 'h';
      const d = Math.floor(hrs / 24), h = Math.round(hrs % 24); return h > 0 ? `${d}d${h}h` : `${d}d`;
    }

    function renderAll() {
      if (!data) return;
      renderRegions(); renderPins(); renderPaths();
    }

    function renderRegions() {
      const g = document.getElementById('regionsG');
      if (!g) return;
      g.innerHTML = (data.locations || [])
        .filter(loc => loc.polygon && Array.isArray(loc.polygon) && loc.polygon.length >= 3)
        .map(loc => {
          const isSel = loc.id == selLoc;
          const svgPts = loc.polygon.map(p => { const s = pctToSvg(p.x, p.y); return `${s.x},${s.y}`; }).join(' ');
          const { x: cx, y: cy } = pctToSvg(loc.x, loc.y);
          return `<g class="region-g${isSel ? ' sel' : ''}" data-id="${loc.id}"
              onclick="selectLoc(${loc.id})"
              onmouseenter="showPinTooltip(event,${loc.id})"
              onmouseleave="hidePinTooltip()">
            <polygon class="region-poly" points="${svgPts}"/>
            <text class="region-label" x="${cx}" y="${cy}">${esc(loc.name)}</text>
          </g>`;
        }).join('');
    }

    function renderPins() {
      const g = document.getElementById('pinsG');
      g.innerHTML = (data.locations || [])
        .filter(loc => !(loc.polygon && Array.isArray(loc.polygon) && loc.polygon.length >= 3))
        .map(loc => {
          const { x, y } = pctToSvg(loc.x, loc.y);
          const isSel = loc.id == selLoc;
          return `<g class="pin-g${isSel ? ' sel' : ''}" data-id="${loc.id}"
              onclick="selectLoc(${loc.id})"
              onmouseenter="showPinTooltip(event,${loc.id})"
              onmouseleave="hidePinTooltip()">
            <circle class="pin-circle" cx="${x}" cy="${y}" r="9" fill="#1e1810" stroke="${isSel ? '#c9a84c' : '#7a6030'}" stroke-width="${isSel ? 2.2 : 1.5}" opacity=".92"/>
            <text class="pin-label" x="${x}" y="${y + 20}">${esc(loc.name)}</text>
          </g>`;
        }).join('');
    }

    function showPinTooltip(event, locId) {
      const loc = (data.locations || []).find(l => l.id == locId);
      if (!loc) return;

      // Collect all waypoints across paths that reference this location, with their event info
      const linkedEvents = [];
      (data.paths || []).forEach(p => {
        const wpts = Array.isArray(p.waypoints) ? p.waypoints : JSON.parse(p.waypoints || '[]');
        wpts.forEach(w => {
          if (w.locId == locId) {
            const ids = w.eventIds || (w.eventId ? [w.eventId] : []);
            const titles = w.eventTitles || (w.eventTitle ? [w.eventTitle] : []);
            ids.forEach((evId, i) => {
              const title = titles[i] || 'Event';
              if (!linkedEvents.find(e => e.id == evId)) linkedEvents.push({ id: evId, title });
            });
          }
        });
      });

      const tt = document.getElementById('mapTooltip');
      tt.innerHTML =
        `<div class="tt-name">📍 ${esc(loc.name)}</div>` +
        (loc.size_type ? `<div class="tt-type">${esc(loc.size_type)}</div>` : '') +
        (loc.location_description ? `<div class="tt-desc">${esc(loc.location_description)}</div>` : '') +
        (linkedEvents.length ? `<div class="tt-events">${linkedEvents.map(e => {
          const ev = (data.events || {})[e.id];
          const dateStr = ev?.year && ev?.day_of_year ? ` · Yr ${ev.year} D${ev.day_of_year}` : '';
          return `<div class="tt-event">🗓 ${esc(e.title)}${esc(dateStr)}</div>`;
        }).join('')}</div>` : '');

      tt.style.display = 'block';
      positionTooltip(event);
    }

    function hidePinTooltip() {
      document.getElementById('mapTooltip').style.display = 'none';
    }

    function showEvTooltip(mouseEvent, evId) {
      const ev = (data.events || {})[evId];
      if (!ev) return;

      // Format date using campaign calendar helpers if available, else plain
      const dateStr = ev.year && ev.day_of_year
        ? `Year ${ev.year}, Day ${ev.day_of_year}`
        : null;

      const tt = document.getElementById('evTooltip');
      tt.innerHTML =
        `<div class="evt-title">🗓 ${esc(ev.title)}</div>` +
        (dateStr ? `<div class="evt-row"><span class="evt-lbl">📅</span><span class="evt-val">${esc(dateStr)}</span></div>` : '') +
        (ev.location ? `<div class="evt-row"><span class="evt-lbl">📍</span><span class="evt-val">${esc(ev.location)}</span></div>` : '') +
        (ev.player_name ? `<div class="evt-row"><span class="evt-lbl">⚔️</span><span class="evt-val">${esc(ev.player_name)}</span></div>` : '') +
        (ev.description ? `<div class="evt-desc">${esc(ev.description)}</div>` : '');

      tt.style.display = 'block';
      positionEvTooltip(mouseEvent);
    }

    function hideEvTooltip() {
      document.getElementById('evTooltip').style.display = 'none';
    }

    function positionEvTooltip(event) {
      const tt = document.getElementById('evTooltip');
      const pad = 12;
      let lft = event.clientX + pad;
      let top = event.clientY + pad;
      const { innerWidth: vw, innerHeight: vh } = window;
      if (lft + 280 > vw) lft = event.clientX - 280 - pad;
      if (top + tt.offsetHeight + 20 > vh) top = event.clientY - tt.offsetHeight - pad;
      tt.style.left = lft + 'px';
      tt.style.top = top + 'px';
    }

    // Helper: build a hoverable event chip
    function evChip(evId, title) {
      return `<span class="ev-chip"
          onmouseenter="showEvTooltip(event,${evId})"
          onmousemove="positionEvTooltip(event)"
          onmouseleave="hideEvTooltip()">🗓 ${esc(title)}</span>`;
    }

    function positionTooltip(event) {
      const tt = document.getElementById('mapTooltip');
      const pad = 12;
      let lft = event.clientX + pad;
      let top = event.clientY + pad;
      const { innerWidth: vw, innerHeight: vh } = window;
      if (lft + 260 > vw) lft = event.clientX - 260 - pad;
      if (top + tt.offsetHeight + 20 > vh) top = event.clientY - tt.offsetHeight - pad;
      tt.style.left = lft + 'px';
      tt.style.top = top + 'px';
    }

    function renderPaths() {
      const g = document.getElementById('pathsG');
      g.innerHTML = (data.paths || []).map(p => {
        const wpts = Array.isArray(p.waypoints) ? p.waypoints : JSON.parse(p.waypoints || '[]');
        if (wpts.length < 2) return '';
        const color = p.tracker_color || '#c9a84c';
        const sel = p.id == selPath;
        const pts = wpts.map(w => { const s = pctToSvg(w.x, w.y); return `${s.x},${s.y}`; }).join(' ');
        const mid = wpts[Math.floor(wpts.length / 2)];
        const ms = pctToSvg(mid.x, mid.y);
        const dl = p.distance_miles ? `<text class="path-dist-label" x="${ms.x}" y="${ms.y - 10}">${p.distance_miles}mi</text>` : '';
        return `
      <polyline points="${pts}" data-path-id="${p.id}" onclick="selectPath(${p.id})"
        fill="none" stroke="${color}" stroke-width="${sel ? 3.5 : 2}" stroke-linecap="round" stroke-linejoin="round"
        opacity="${sel ? 1 : 0.72}" marker-end="url(#arrowhead)" style="cursor:pointer"/>
      ${dl}`;
      }).join('');
    }

    function selectLoc(id) {
      selPath = null; selLoc = id;
      hidePinTooltip();
      const loc = (data.locations || []).find(l => l.id == id);
      if (!loc) return;
      const isRegion = loc.polygon && Array.isArray(loc.polygon) && loc.polygon.length >= 3;
      const head = document.getElementById('rpHead');
      const body = document.getElementById('rpBody');
      head.textContent = (isRegion ? '🗾 ' : '📍 ') + loc.name;

      // Distances (bidirectional)
      const myDists = (data.distances || []).filter(d => d.from_loc_id == id || d.to_loc_id == id);
      const distRows = myDists.map(d => {
        const otherId = d.from_loc_id == id ? d.to_loc_id : d.from_loc_id;
        const toLoc = (data.locations || []).find(l => l.id == otherId); if (!toLoc) return '';
        const mi = parseFloat(d.distance_miles);
        return `<div class="info-row">
          <span class="info-lbl">📍 ${esc(toLoc.name)}</span>
          <span class="info-val">${mi} mi <span style="color:var(--text-dim);font-size:10px">(🚶${fmtTime(mi / SPEEDS.walk)} 🐎${fmtTime(mi / SPEEDS.horse)} 🦅${fmtTime(mi / SPEEDS.fly)})</span></span>
        </div>`;
      }).join('');

      // Linked timeline events from waypoints across all paths
      const linkedEvents = [];
      (data.paths || []).forEach(p => {
        const wpts = Array.isArray(p.waypoints) ? p.waypoints : JSON.parse(p.waypoints || '[]');
        wpts.forEach(w => {
          if (w.locId == id) {
            const ids = w.eventIds || (w.eventId ? [w.eventId] : []);
            const titles = w.eventTitles || (w.eventTitle ? [w.eventTitle] : []);
            ids.forEach((evId, i) => {
              const title = titles[i] || 'Event';
              if (!linkedEvents.find(e => e.id == evId))
                linkedEvents.push({ id: evId, title, pathName: p.name || 'Path' });
            });
          }
        });
      });

      const eventRows = linkedEvents.map(e =>
        `<div class="info-row" style="align-items:flex-start;gap:6px">
          ${evChip(e.id, e.title)}
          <span class="info-val" style="font-size:10px;color:var(--text-dim)">${esc(e.pathName)}</span>
        </div>`
      ).join('');

      body.innerHTML =
        (loc.size_type ? `<div class="info-card"><div class="info-row"><span class="info-lbl">Type</span><span class="info-val" style="text-transform:capitalize">${esc(loc.size_type)}</span></div></div>` : '') +
        (loc.location_description ? `<div class="info-card"><h3>📖 Description</h3><p style="font-size:12px;color:var(--text-dim);line-height:1.5;margin:0">${esc(loc.location_description)}</p></div>` : '') +
        (linkedEvents.length ? `<div class="info-card"><h3>🗓 Linked Events</h3>${eventRows}</div>` : '') +
        `<div class="info-card"><h3>📏 Distances</h3>
          ${distRows || '<div class="rp-empty" style="font-size:11px">No distances set.</div>'}
        </div>`;

      renderRegions(); renderPins(); renderPaths();
    }

    function selectPath(id) {
      selPath = id;
      const p = (data.paths || []).find(p => p.id == id); if (!p) return;
      const wpts = Array.isArray(p.waypoints) ? p.waypoints : JSON.parse(p.waypoints || '[]');
      const dist = p.distance_miles ? parseFloat(p.distance_miles) : null;
      const head = document.getElementById('rpHead');
      const body = document.getElementById('rpBody');
      head.textContent = '🛤️ ' + (p.name || 'Path');
      const wptRows = wpts.map((w, i) => {
        const loc = w.locId ? (data.locations || []).find(l => l.id == w.locId) : null;
        const ids = w.eventIds || (w.eventId ? [w.eventId] : []);
        const titles = w.eventTitles || (w.eventTitle ? [w.eventTitle] : []);
        const evChips = ids.map((evId, ei) => evChip(evId, titles[ei] || 'Event')).join('');
        return `<div class="wpt-row" style="flex-wrap:wrap;gap:3px">
          <span>${i === 0 ? '⊙' : '→'} ${loc ? '📍 ' + esc(loc.name) : 'Point ' + (i + 1)}</span>
          ${evChips ? `<div style="display:flex;flex-wrap:wrap;gap:2px;padding-left:4px">${evChips}</div>` : ''}
        </div>`;
      }).join('');
      body.innerHTML = `
    <div class="info-card"><h3>Tracker</h3>
      <div class="info-row"><span class="info-lbl">Name</span>
        <span class="info-val" style="color:${p.tracker_color || '#c9a84c'}">${esc(p.tracker_name || '—')}</span></div>
      ${dist ? `<div class="info-row"><span class="info-lbl">Distance</span><span class="info-val">${dist} mi</span></div>` : ''}
    </div>
    ${dist ? `<div class="info-card"><h3>⏱ Travel Times</h3>
      <div class="travel-grid">
        <div class="travel-badge"><span class="t-icon">🚶</span><div class="t-time">${fmtTime(dist / SPEEDS.walk)}</div><div class="t-lbl">Walking</div></div>
        <div class="travel-badge"><span class="t-icon">🐎</span><div class="t-time">${fmtTime(dist / SPEEDS.horse)}</div><div class="t-lbl">Horse</div></div>
        <div class="travel-badge"><span class="t-icon">🦅</span><div class="t-time">${fmtTime(dist / SPEEDS.fly)}</div><div class="t-lbl">Flying</div></div>
      </div></div>` : ''}
    ${p.notes ? `<div class="info-card"><h3>📝 Notes</h3><p style="font-size:12px;color:var(--text-dim);line-height:1.5">${esc(p.notes)}</p></div>` : ''}
    ${wpts.length ? `<div class="info-card"><h3>Waypoints</h3>${wptRows}</div>` : ''}`;
      renderPaths();
    }

    function buildSidebar() {
      const head = document.getElementById('rpHead');
      const body = document.getElementById('rpBody');
      head.textContent = 'Map Details';

      const trackerRows = (data.trackers || []).map(t => {
        const ICONS = { group: '👥', player: '⚔️', npc: '🧙' };
        return `<div class="legend-row">
      <div class="legend-dot" style="background:${t.color}"></div>
      <span style="font-size:12px">${ICONS[t.type] || '👥'} ${esc(t.name)}</span>
    </div>`;
      }).join('');

      const pathChips = (data.paths || []).map(p => `
    <div class="path-chip ${p.id == selPath ? 'sel' : ''}" onclick="selectPath(${p.id})">
      <div class="legend-dot" style="background:${p.tracker_color || '#c9a84c'}"></div>
      <span>${esc(p.name || 'Path')}</span>
      ${p.distance_miles ? `<span style="margin-left:auto;font-size:11px;color:var(--text-dim)">${p.distance_miles}mi</span>` : ''}
    </div>`).join('');

      body.innerHTML = `
    <div class="info-card"><h3>🗺️ ${esc(data.map.name)}</h3>
      ${data.map.description ? `<p style="font-size:12px;color:var(--text-dim);margin-top:4px">${esc(data.map.description)}</p>` : ''}
      <div class="info-row" style="margin-top:6px"><span class="info-lbl">Locations</span><span class="info-val">${(data.locations || []).length}</span></div>
      <div class="info-row"><span class="info-lbl">Paths</span><span class="info-val">${(data.paths || []).length}</span></div>
    </div>
    ${trackerRows ? `<div class="info-card"><h3>Trackers</h3>${trackerRows}</div>` : ''}
    ${pathChips ? `<div class="info-card"><h3>Paths</h3>${pathChips}</div>` : ''}
    <div class="rp-empty" style="margin-top:8px">Click any pin or path on the map for details.</div>`;
    }

    init();
  </script>
</body>

</html>
