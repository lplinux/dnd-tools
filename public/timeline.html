    /* ════════════════════════════════════════
       EVENT DRAG (move on timeline)
    ════════════════════════════════════════ */
    let _evDrag = null;// {evId, startX, startY, hasMoved, ghostEl}

    function initEvDrag() {
      const tb = document.getElementById('tl-body');
      tb.addEventListener('mousedown', evDragStart);
      window.addEventListener('mousemove', evDragMove);
      window.addEventListener('mouseup', evDragEnd);
      // Double-click zooms in 2× centred on the clicked position
      tb.addEventListener('dblclick', e => {
        if (e.target.closest('.ev-g')) return; // let event circles handle their own dblclick
        const body = document.getElementById('tl-body');
        const bodyR = body.getBoundingClientRect();
        const clickY = e.clientY - bodyR.top + body.scrollTop;
        const newPPD = Math.min(MAX_PPD, PPD * 2);
        if (newPPD === PPD) return;
        // Keep the clicked Y position stable after zoom
        const ratio = newPPD / PPD;
        PPD = newPPD;
        document.getElementById('zoom').value = ppdToSlider(PPD);
        document.getElementById('zlbl').textContent = granLabel();
        renderTimeline();
        // Scroll so the clicked point stays in the same visual position
        setTimeout(() => { body.scrollTop = clickY * ratio - (e.clientY - bodyR.top); }, 0);
      });
    }
    function evDragStart(e) {
      const g = e.target.closest('.ev-g'); if (!g) return;
      e.preventDefault();
      const wrapR = document.getElementById('tl-lw').getBoundingClientRect();
      _evDrag = { evId: g.dataset.eid, startX: e.clientX, startY: e.clientY, hasMoved: false, wrapR };
    }
    function evDragMove(e) {
      if (!_evDrag) return;
      const dx = e.clientX - _evDrag.startX, dy = e.clientY - _evDrag.startY;
      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) _evDrag.hasMoved = true;
      if (!_evDrag.hasMoved) return;
      onEvLeave(); // hide tooltip during drag
      document.getElementById('tl-body').style.cursor = 'grabbing';

      const body = document.getElementById('tl-body');
      const bodyR = body.getBoundingClientRect();
      const svgX = e.clientX - bodyR.left + body.scrollLeft;
      const svgY = e.clientY - bodyR.top + body.scrollTop;

      // Ghost circle
      const svgB = document.getElementById('svg-body');
      let ghost = document.getElementById('drag-ghost');
      if (!ghost) {
        ghost = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        ghost.id = 'drag-ghost'; ghost.classList.add('drag-ghost-circle');
        ghost.setAttribute('r', R); ghost.setAttribute('fill', 'rgba(200,180,60,.5)');
        ghost.setAttribute('stroke', 'white'); ghost.setAttribute('stroke-width', '2');
        ghost.setAttribute('stroke-dasharray', '4,2');
        svgB.appendChild(ghost);
      }
      ghost.setAttribute('cx', svgX); ghost.setAttribute('cy', svgY);

      // Highlight target column
      const svgBW = +svgB.getAttribute('width') || 1;
      const dynW = Math.max(1, svgBW / Math.max(1, _dispLocs.length));
      const locIdx = Math.max(0, Math.min(_dispLocs.length - 1, Math.floor(svgX / dynW)));
      const colX = locIdx * dynW;
      let hi = document.getElementById('drag-col-hi');
      if (!hi) {
        hi = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        hi.id = 'drag-col-hi'; hi.classList.add('col-drag-line');
        hi.setAttribute('fill', 'rgba(200,180,60,.07)'); hi.setAttribute('stroke', 'var(--gold-dim)'); hi.setAttribute('stroke-width', '1');
        hi.setAttribute('pointer-events', 'none');
        svgB.appendChild(hi);
      }
      const totalH = +svgB.getAttribute('height');
      hi.setAttribute('x', colX); hi.setAttribute('y', 0); hi.setAttribute('width', dynW); hi.setAttribute('height', totalH);
    }
    function evDragEnd(e) {
      document.getElementById('tl-body').style.cursor = '';
      if (!_evDrag) { return; }
      const { evId, hasMoved } = _evDrag;
      document.getElementById('drag-ghost')?.remove();
      document.getElementById('drag-col-hi')?.remove();
      if (hasMoved) {
        const body = document.getElementById('tl-body');
        const bodyR = body.getBoundingClientRect();
        const svgX = e.clientX - bodyR.left + body.scrollLeft;
        const svgY = e.clientY - bodyR.top + body.scrollTop;
        const svgBW2 = +(document.getElementById('svg-body').getAttribute('width') || 1);
        const dynW2 = Math.max(1, svgBW2 / Math.max(1, _dispLocs.length));
        const locIdx = Math.max(0, Math.min(_dispLocs.length - 1, Math.floor(svgX / dynW2)));
        const newLocation = _dispLocs[locIdx];
        const newAbs = Math.max(0, yToAbsDay(svgY));
        // Snap to the nearest valid segment day (avoid placing in gaps)
        let snappedAbs = newAbs;
        if (_segments.length) {
          let bestDist = Infinity;
          for (const s of _segments) {
            const clamped = Math.max(s.minA, Math.min(s.maxA, newAbs));
            const dist = Math.abs(clamped - newAbs);
            if (dist < bestDist) { bestDist = dist; snappedAbs = clamped; }
          }
        }
        const { year, dayOfYear } = fromAbsDay(snappedAbs);
        // Snap dayOfYear to valid range
        const safeDoY = Math.max(1, Math.min(currentCal() === 'harptos' ? 365 : gregDaysInYear(year), dayOfYear));
        const ev = db.events.find(x => x.id === evId);
        if (ev && newLocation) { ev.year = year; ev.dayOfYear = safeDoY; ev.location = newLocation; saveDB(); renderAll(); }
      }
      _evDrag = null;
    }
    function onEvClick(e, eid) { if (_evDrag && _evDrag.hasMoved) return; openEventModal(eid); }

      }).sort((a, b) => absDay(a.year, a.dayOfYear) - absDay(b.year, b.dayOfYear));

        ? `<div class="sr-empty">No results for "${esc(q)}"</div>`

      const mSel = document.getElementById('m-td-month');
      const dayInp = document.getElementById('m-td-day');
      if (mlbl) mlbl.textContent = cal === 'harptos' ? 'Month / Festival' : 'Month';
      if (mSel) mSel.innerHTML = cal === 'harptos'
        ? HARPTOS.map((p, i) => `<option value="${i}">${p.name}${p.sp ? ' ✦' : ''}</option>`).join('')
        : GREG_MONTHS.map((m, i) => `<option value="${i}">${m}</option>`).join('');
      if (dayInp) { dayInp.disabled = false; }
    }
    function onNewProfileTodayMonthChange(sel) {
      const cal = document.getElementById('m-pcal')?.value || 'harptos';
      if (cal !== 'harptos') return;
      const p = HARPTOS[+sel.value]; const d = document.getElementById('m-td-day');
      if (p && p.sp) { d.value = 1; d.disabled = true; } else if (d) { d.disabled = false; }
    }
    function onEditMonth(sel) {
      if (currentCal() !== 'harptos') return;
      const p = HARPTOS[+sel.value]; const d = document.getElementById('m-ev-d');
      if (p.sp) { d.value = 1; d.disabled = true; } else d.disabled = false;
    }
    function onTodayMonthChange(sel) {
      if (currentCal() !== 'harptos') return;
      const p = HARPTOS[+sel.value]; const d = document.getElementById('td-day');
      if (p.sp) { d.value = 1; d.disabled = true; } else d.disabled = false;
    }
    function confirmSetToday() {
      const cal = currentCal();
      const year = +document.getElementById('td-year').value || 1492;
      const midx = +document.getElementById('td-month').value;
      const day = +document.getElementById('td-day').value || 1;
      const doy = doyFromForm(midx, day, year, cal);
      db.todayAbs = absDay(year, doy);
      saveDB(); closeModal(); renderTimeline();
      renderTodaySection(); syncNewEventDateFromToday();
    }
    function clearToday() { db.todayAbs = null; saveDB(); closeModal(); renderTimeline(); renderTodaySection(); }
    function closeModal() { document.getElementById('mbg').style.display = 'none'; }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeSearch(); } });
    function openEventModal(id) { const ev = db.events.find(e => e.id === id); if (ev) openModal('view-event', ev); }
    function editEvent(id) { const ev = db.events.find(e => e.id === id); if (ev) openModal('edit-event', ev); }

    /* ════════════════════════════════════════
       MUTATIONS
    ════════════════════════════════════════ */
    function confirmNewProfile() {
      const name = document.getElementById('m-pname').value.trim();
      if (!name) { alert('Please enter a name.'); return; }
      const cal = document.getElementById('m-pcal').value;
      const players = document.getElementById('m-pplayers').value;
      const locs = document.getElementById('m-plocs').value;
      // Read optional today marker
      const tdYearRaw = document.getElementById('m-td-year').value.trim();
      let todayAbs = null;
      if (tdYearRaw) {
        const tdYear = +tdYearRaw;
        const tdMidx = +document.getElementById('m-td-month').value;
        const tdDay = +document.getElementById('m-td-day').value || 1;
        const tdDoy = doyFromForm(tdMidx, tdDay, tdYear, cal);
        todayAbs = absDay(tdYear, tdDoy);
      }
      closeModal(); createProfile(name, cal, players, locs, todayAbs);
    }
    function confirmAddPlayer() {
      const name = document.getElementById('m-name').value.trim(); if (!name) return;
      db.players.push({ id: uid(), name, color: _sc }); saveDB(); closeModal(); renderAll();
    }
    function confirmAddLocation() {
      const loc = document.getElementById('m-loc').value.trim();
      if (!loc || db.locations.includes(loc)) return;
      db.locations.push(loc); db.locationOrder.push(loc); saveDB(); closeModal(); renderAll();
    }
    function editPlayerColor(pid) {
      const p = getPlayer(pid); if (!p) return;
      // Use a temporary hidden input[type=color] for the native picker
      let inp = document.getElementById('_color-picker');
      if (!inp) { inp = document.createElement('input'); inp.type = 'color'; inp.id = '_color-picker'; inp.style.cssText = 'position:absolute;opacity:0;pointer-events:none;width:1px;height:1px'; document.body.appendChild(inp); }
      inp.value = p.color;
      inp.onchange = () => { p.color = inp.value; saveDB(); renderAll(); };
      inp.click();
    }
    function removePlayer(id) {
      if (!confirm('Remove this player? Events with no other players will also be deleted.')) return;
      db.players = db.players.filter(p => p.id !== id);
      // Remove player from all events, then delete events that have no players left
      db.events.forEach(ev => { ev.playerIds = (ev.playerIds || []).filter(pid => pid !== id); });
      db.events = db.events.filter(ev => ev.playerIds.length > 0);
      // Also remove any manual links pointing to now-deleted events
      const validIds = new Set(db.events.map(e => e.id));
      db.events.forEach(ev => { ev.manualLinks = (ev.manualLinks || []).filter(id => validIds.has(id)); });
      saveDB(); renderAll();
    }
    function removeLocationByName(loc) {
      const count = db.events.filter(e => e.location === loc).length;
      if (count > 0 && !confirm(`"${loc}" has ${count} event${count === 1 ? '' : 's'}. Delete them all?`)) return;
      db.events = db.events.filter(e => e.location !== loc);
      db.locations = db.locations.filter(l => l !== loc);
      db.locationOrder = db.locationOrder.filter(l => l !== loc);
      // Clean up any manual links that now point to deleted events
      const validIds = new Set(db.events.map(e => e.id));
      db.events.forEach(ev => { ev.manualLinks = (ev.manualLinks || []).filter(id => validIds.has(id)); });
      saveDB(); renderAll();
    }
    function addEvent() {
      const title = document.getElementById('ev-title').value.trim();
      const location = document.getElementById('ev-loc').value;
      const year = +document.getElementById('ev-year').value;
      const midx = +document.getElementById('ev-month').value;
      const day = +document.getElementById('ev-day').value;
      const desc = document.getElementById('ev-desc').value.trim();
      const durRaw = document.getElementById('ev-dur').value.trim();
      const playerIds = [...document.querySelectorAll('#ev-pchks input:checked')].map(i => i.value);
      if (!title) { alert('Enter a title.'); return; } if (!location) { alert('Select a location.'); return; }
      if (!playerIds.length) { alert('Select at least one player.'); return; } if (!year) { alert('Enter a year.'); return; }
      const dayOfYear = doyFromForm(midx, day, year, currentCal());
      const durationDays = parseDuration(durRaw);
      db.events.push({ id: uid(), title, playerIds, location, year, dayOfYear, description: desc, durationDays });
      saveDB();
      document.getElementById('ev-title').value = ''; document.getElementById('ev-desc').value = '';
      document.getElementById('ev-dur').value = '1d';
      document.querySelectorAll('#ev-pchks input').forEach(i => i.checked = false);
      renderAll();
      setTimeout(() => {
        const body = document.getElementById('tl-body');
        const ty = dayY(absDay(year, dayOfYear));
        body.scrollTo({ top: Math.max(0, ty - body.clientHeight / 2), behavior: 'smooth' });
      }, 80);
    }
    function quickDeleteEvent(id) {
      if (!confirm('Delete this event?')) return;
      db.events = db.events.filter(e => e.id !== id); saveDB(); renderAll();
    }
    function deleteEvent(id) {
      if (!confirm('Delete this event from the chronicle?')) return;
      db.events = db.events.filter(e => e.id !== id); saveDB(); closeModal(); renderAll();
    }
    function saveEditEvent(id) {
      const ev = db.events.find(e => e.id === id); if (!ev) return;
      const midx = +document.getElementById('m-ev-m').value;
      const day = +document.getElementById('m-ev-d').value;
      const cal = currentCal();
      const newPids = [...document.querySelectorAll('.mpc input:checked')].map(i => i.value);
      ev.title = document.getElementById('m-ev-t').value.trim() || ev.title;
      ev.playerIds = newPids.length ? newPids : ev.playerIds;
      ev.location = document.getElementById('m-ev-l').value;
      ev.year = +document.getElementById('m-ev-y').value || ev.year;
      ev.dayOfYear = doyFromForm(midx, day, ev.year, cal);
      ev.description = document.getElementById('m-ev-desc').value.trim();
      ev.durationDays = parseDuration(document.getElementById('m-ev-dur').value);
      ev.manualLinks = [...document.querySelectorAll('.ml-chk:checked')].map(i => i.value);
      saveDB(); closeModal(); renderAll();
    }

    /* ════════════════════════════════════════
       IMPORT / EXPORT
    ════════════════════════════════════════ */
    function exportData() {
      const p = currentProfile();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([JSON.stringify({ profile: p, db }, null, 2)], { type: 'application/json' }));
      a.download = `${(p?.name || 'timeline').replace(/[^a-z0-9]/gi, '-')}.json`; a.click();
    }
    function exportCSV() {
      const se = sortedEvents();
      const rows = [['Date', 'Year', 'Day of Year', 'Title', 'Location', 'Duration', 'Players', 'Description']];
      se.forEach(ev => {
        const pNames = getPlayers(ev).map(p => p.name).join('; ');
        const csvCell = v => '"' + String(v ?? '').replace(/"/g, '""') + '"';
        rows.push([
          csvCell(formatDate(ev.year, ev.dayOfYear)),
          csvCell(ev.year),
          csvCell(ev.dayOfYear),
          csvCell(ev.title),
          csvCell(ev.location),
          csvCell(formatDuration(ev.durationDays || 1)),
          csvCell(pNames),
          csvCell(ev.description || '')
        ]);
      });
      const csv = rows.map(r => r.join(',')).join('\r\n');
      const p = currentProfile();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
      a.download = `${(p?.name || 'timeline').replace(/[^a-z0-9]/gi, '-')}-events.csv`; a.click();
    }
    function importData() {
      const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json';
      inp.onchange = e => {
        const f = e.target.files[0]; if (!f) return;
        const r = new FileReader();
        r.onload = ev => {
          try {
            const d = JSON.parse(ev.target.result);
            // Support both old format (players/locations/events) and new (profile+db)
            const data = d.db || d;
            if (data.players && data.locations && data.events) {
              db = data; db.events = db.events.map(migrateEv);
              if (!db.locationOrder || !db.locationOrder.length) db.locationOrder = [...db.locations];
              saveDB(); renderAll();
            } else alert('Invalid file.');
          } catch (err) { alert('Parse error: ' + err.message); }
        }; r.readAsText(f);
      }; inp.click();
    }

    /* ════════════════════════════════════════
       INIT
    ════════════════════════════════════════ */
    function renderAll() { renderSidebar(); if (_view === 'graph') renderTimeline(); else renderTable(); }

    const DEMO_DB = {
      players: [{ id: 'p1', name: 'Aldric', color: '#c0392b' }, { id: 'p2', name: 'Miriel', color: '#2980b9' }, { id: 'p3', name: 'Zora', color: '#27ae60' }],
      locations: ["Baldur's Gate", 'Neverwinter', 'Waterdeep'],
      locationOrder: ['Waterdeep', 'Neverwinter', "Baldur's Gate"],
      events: [
        { id: 'e1', title: 'Yawning Portal Brawl', playerIds: ['p1'], location: 'Waterdeep', year: 1492, dayOfYear: 8, description: 'Fought off cultists beneath the tavern.' },
        { id: 'e2', title: 'Ledger Theft', playerIds: ['p2'], location: "Baldur's Gate", year: 1492, dayOfYear: 15, description: 'Stole the merchant guild ledger.' },
        { id: 'e3', title: 'Dragon Sighting', playerIds: ['p3'], location: 'Neverwinter', year: 1492, dayOfYear: 31, description: 'Midwinter — broken up by a white dragon.' },
        { id: 'e4', title: "Lords' Alliance Summons", playerIds: ['p1'], location: 'Waterdeep', year: 1492, dayOfYear: 44, description: '' },
        { id: 'e5', title: 'Ship Arrival', playerIds: ['p2'], location: 'Waterdeep', year: 1492, dayOfYear: 60, description: 'Arrived with stolen cargo.' },
        { id: 'e6', title: 'Dungeon Delve', playerIds: ['p3'], location: 'Waterdeep', year: 1492, dayOfYear: 60, description: 'Explored the ruins beneath Waterdeep.' },
        { id: 'e7', title: 'Council of Three', playerIds: ['p1', 'p2', 'p3'], location: 'Waterdeep', year: 1492, dayOfYear: 72, description: 'All three gathered to plan the heist.' },
        { id: 'e8', title: 'Trade Alliance', playerIds: ['p3'], location: "Baldur's Gate", year: 1492, dayOfYear: 92, description: 'Greengrass negotiations sealed.' },
        { id: 'e9', title: 'Reunion at the Gate', playerIds: ['p1', 'p2'], location: "Baldur's Gate", year: 1492, dayOfYear: 105, description: '' },
      ]
    };

    window.addEventListener('load', () => {
      loadProfiles(); loadUIState();

      // First-ever launch: create demo profile
      if (!_profiles.length) {
        const demoId = 'demo';
        _profiles = [{ id: demoId, name: 'Demo Campaign', calendarType: 'harptos' }];
        _activeId = demoId; saveProfiles();
        localStorage.setItem('ht-db-' + demoId, JSON.stringify(DEMO_DB));
      }
      if (!_activeId || !profileById(_activeId)) _activeId = _profiles[0].id;

      db = loadDB();
      renderProfileSelect();
      initMonthUI();
      document.getElementById('cal-badge').textContent = currentCal() === 'harptos' ? 'Harptos' : 'Gregorian';

      // Apply theme
      document.documentElement.setAttribute('data-theme', _theme);
      document.querySelectorAll('.theme-sw button').forEach(b => b.classList.toggle('act', b.dataset.t === _theme));

      setView(_view);
      renderAll();
      initEvDrag();
      requestAnimationFrame(() => fitAll());
    });

    // Re-render on resize so dynamic COL_W stays correct
    window.addEventListener('resize', () => { if (_view === 'graph') renderTimeline(); });
  </script>
