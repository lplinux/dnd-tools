<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗡️ Item Card Creator</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root,
        [data-theme="dark"] {
            --bg: #13100b;
            --surface: #1e1810;
            --surface2: #272015;
            --surface3: #302818;
            --border: #3d3220;
            --border2: #554428;
            --gold: #c9a84c;
            --gold-dim: #7a6030;
            --gold-glow: #e8c96a;
            --text: #e8dcc0;
            --text-dim: #a09070;
            --text-muted: #6a5a40;
            --red: #a03028;
            --fd: 'Cinzel', 'Georgia', serif;
            --fb: 'Crimson Text', 'Georgia', serif;
        }

        [data-theme="light"] {
            --bg: #f5f0e8;
            --surface: #fffdf7;
            --surface2: #f0ece0;
            --surface3: #e8e2d4;
            --border: #d4c9b0;
            --border2: #b8a888;
            --gold: #8b6914;
            --gold-dim: #a07820;
            --text: #2a2218;
            --text-dim: #5a4e38;
            --text-muted: #8a7a60;
            --red: #c0392b;
            --fd: 'Cinzel', 'Georgia', serif;
            --fb: 'Crimson Text', 'Georgia', serif;
        }

        [data-theme="slate"] {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #1c2128;
            --surface3: #22272e;
            --border: #30363d;
            --border2: #444c56;
            --gold: #58a6ff;
            --gold-dim: #1f6feb;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --text-muted: #484f58;
            --red: #f85149;
            --fd: 'Cinzel', 'Georgia', serif;
            --fb: 'Crimson Text', 'Georgia', serif;
        }

        html,
        body {
            height: 100%;
            overflow: hidden
        }

        body {
            font-family: var(--fb);
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            transition: background .2s, color .2s
        }

        .app {
            height: 100vh;
            display: flex;
            flex-direction: column
        }

        .app-header {
            background: var(--surface);
            border-bottom: 2px solid var(--gold-dim);
            padding: 7px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .5)
        }

        .app-title {
            font-family: var(--fd);
            font-size: .95rem;
            color: var(--gold);
            letter-spacing: .08em;
        }

        .hdr-r {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            margin-left: auto
        }

        .theme-sw {
            display: flex;
            gap: 4px;
        }

        .theme-sw button {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: border-color .15s;
            flex-shrink: 0
        }

        .theme-sw button.act {
            border-color: var(--gold) !important
        }

        .theme-sw button[data-t="dark"] {
            background: #272015;
        }

        .theme-sw button[data-t="light"] {
            background: #f0ece0;
        }

        .theme-sw button[data-t="slate"] {
            background: #1c2128;
        }

        .app-body {
            flex: 1;
            display: flex;
            overflow: hidden
        }

        .s-content {
            max-height: 999px;
            overflow: hidden;
            transition: max-height .2s
        }

        .s-content.collapsed {
            max-height: 0
        }

        .s-form {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .form-checkbox-group {
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            border-top: 1px solid var(--border)
        }

        .form-checkbox-group input[type="checkbox"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .form-checkbox-group label {
            cursor: pointer;
            font-size: 13px;
        }

        .s-button {
            background: var(--gold-dim);
            color: var(--text);
            border: none;
            padding: 6px 10px;
            border-radius: 2px;
            font-family: var(--fd);
            font-size: .7rem;
            letter-spacing: .06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .15s
        }

        .s-button:hover {
            background: var(--gold)
        }

        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 16px;
            overflow: hidden
        }

        .form-panel,
        .preview-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .3)
        }

        .form-header,
        .preview-header {
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            padding: 10px 14px;
            font-family: var(--fd);
            font-size: .75rem;
            color: var(--gold);
            letter-spacing: .08em;
            text-transform: uppercase
        }

        .form-body,
        .preview-body {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: .7rem;
            color: var(--text-dim);
            margin-bottom: 4px;
            font-family: var(--fd);
            letter-spacing: .04em;
            text-transform: uppercase
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border2);
            color: var(--text);
            padding: 6px 8px;
            border-radius: 2px;
            font-family: var(--fb);
            font-size: 13px;
            transition: border-color .15s;
            resize: vertical
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--gold-dim)
        }

        /* Card Preview Styling */
        .card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 23px;
            line-height: 1.5;
            transition: border-color .15s;
        }

        .card.rarity-common {
            border-color: #a0a0a0;
        }

        .card.rarity-uncommon {
            border-color: #3cb371;
        }

        .card.rarity-rare {
            border-color: #4169e1;
        }

        .card.rarity-veryrare {
            border-color: #8a2be2;
        }

        .card.rarity-legendary {
            border-color: #ffd700;
        }

        .card.rarity-artifact {
            border-color: var(--gold);
        }

        .card-name {
            font-family: var(--fd);
            font-size: 3.1rem;
            color: var(--gold);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .card-type,
        .card-stats {
            font-size: 21px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .card-flavor {
            font-style: italic;
            color: var(--text-dim);
            margin-bottom: 8px;
            padding: 8px;
            background: var(--surface3);
            border-left: 2px solid var(--gold-dim);
        }

        .card-abilities {
            font-size: 23px;
            color: var(--text);
            white-space: normal;
            line-height: 1.6;
        }

        /* Rich-text editor for Special Abilities */
        .rte-wrap {
            border: 1px solid var(--border2);
            border-radius: 2px;
            overflow: hidden;
        }

        .rte-toolbar {
            display: flex;
            gap: 1px;
            background: var(--surface3);
            border-bottom: 1px solid var(--border);
            padding: 3px 4px;
        }

        .rte-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-dim);
            width: 24px;
            height: 22px;
            border-radius: 2px;
            font-size: 12px;
            font-family: var(--fd);
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .1s;
            flex-shrink: 0;
        }

        .rte-btn:hover {
            background: var(--border2);
            color: var(--gold);
        }

        .rte-btn.active {
            background: var(--gold-dim);
            color: var(--text);
            border-color: var(--gold-dim);
        }

        .rte-sep {
            width: 1px;
            background: var(--border);
            margin: 2px 3px;
        }

        #abilitiesEditor {
            width: 100%;
            min-height: 90px;
            max-height: 220px;
            overflow-y: auto;
            background: var(--surface2);
            color: var(--text);
            padding: 7px 9px;
            font-family: var(--fb);
            font-size: 13px;
            line-height: 1.6;
            outline: none;
            transition: border-color .15s;
        }

        #abilitiesEditor:focus {
            border-color: var(--gold-dim);
        }

        /* Bullets inside the editor */
        #abilitiesEditor ul {
            padding-left: 1.4em;
            margin: 2px 0;
        }

        #abilitiesEditor ul li {
            margin: 1px 0;
        }

        /* Mirror bullet/bold/italic into preview card */
        .card-abilities ul {
            padding-left: 1.3em;
            margin: 2px 0;
        }

        .card-abilities ul li {
            margin: 1px 0;
        }

        .card-abilities b,
        .card-abilities strong {
            color: var(--gold);
        }

        .card-abilities i,
        .card-abilities em {
            color: var(--text-dim);
        }

        .uses-display {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }

        .use-circle {
            width: 14px;
            height: 14px;
            border: 2px solid var(--gold-dim);
            border-radius: 50%;
            display: inline-block;
        }

        #abilitiesEditor:empty::before {
            content: attr(placeholder);
            color: var(--text-muted);
            pointer-events: none;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        @media print {

            /* card-only print is handled via the new window — block accidental direct prints */
            body>* {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="app-header">
            <div class="app-title">🗡️ Item Card Creator</div>
            <div class="hdr-r">
                <div class="theme-sw" id="themeSw">
                    <button data-t="dark" class="act">◐</button>
                    <button data-t="light">◯</button>
                    <button data-t="slate">◭</button>
                </div>
            </div>
        </div>

        <div class="app-body">
            <div class="main-content">
                <div class="form-panel">
                    <div class="form-header">Edit Item</div>
                    <div class="form-body">
                        <div class="form-group">
                            <label>Item Name</label>
                            <input type="text" id="formItemName" placeholder="e.g., Sword of Dragonslaying">
                        </div>
                        <div class="form-group">
                            <label for="formItemType">Item Type</label>
                            <select id="formItemType" onchange="toggleTypeFields()">
                                <option value="">Select item Type</option>
                                <option value="Accessory">Accessory</option>
                                <option value="Armor">Armor</option>
                                <option value="Artifact">Artifact</option>
                                <option value="Consumable">Consumable</option>
                                <option value="Potion">Potion</option>
                                <option value="Weapon">Weapon</option>
                                <option value="Wondrous Item">Wondrous Item</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Rarity</label>
                            <select id="formItemRarity">
                                <option value="">Select item Rarity</option>
                                <option value="common">Common</option>
                                <option value="uncommon">Uncommon</option>
                                <option value="rare">Rare</option>
                                <option value="veryrare">Very Rare</option>
                                <option value="legendary">Legendary</option>
                                <option value="artifact">Artifact</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Flavor Text</label>
                            <textarea id="formItemFlavor"
                                placeholder="Describe the item's appearance and lore..."></textarea>
                        </div>

                        <div id="formWeaponFields" style="display: none;">
                            <div class="form-group">
                                <label>Damage</label>
                                <input type="text" id="formItemDamage" placeholder="e.g., 1d8+2">
                            </div>
                            <div class="form-group">
                                <label>Damage Type</label>
                                <input type="text" id="formItemDamageType" placeholder="e.g., Slashing">
                            </div>
                            <div class="form-group">
                                <label>Properties</label>
                                <input type="text" id="formItemProperties" placeholder="e.g., Light, Finesse">
                            </div>
                        </div>

                        <div id="formArmorFields" style="display: none;">
                            <div class="form-group">
                                <label>AC Bonus</label>
                                <input type="text" id="formItemAC" placeholder="e.g., +1">
                            </div>
                            <div class="form-group">
                                <label>Type</label>
                                <select id="formItemArmorType">
                                    <option value="">Select Armor Type</option>
                                    <option>Light</option>
                                    <option>Medium</option>
                                    <option>Heavy</option>
                                </select>
                            </div>
                        </div>

                        <div id="formConsumableFields" style="display: none;">
                            <div class="form-group">
                                <label>Uses</label>
                                <input type="number" id="formItemUses" min="1" placeholder="e.g., 3">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Special Abilities</label>
                            <div class="rte-wrap">
                                <div class="rte-toolbar" id="rteToolbar">
                                    <button class="rte-btn" title="Bold (Ctrl+B)" onclick="rteCmd('bold')"
                                        tabindex="-1"><b>B</b></button>
                                    <button class="rte-btn" title="Italic (Ctrl+I)" onclick="rteCmd('italic')"
                                        tabindex="-1"><i>I</i></button>
                                    <div class="rte-sep"></div>
                                    <button class="rte-btn" title="Bullet list" onclick="rteBullet()"
                                        tabindex="-1">•≡</button>
                                    <div class="rte-sep"></div>
                                    <button class="rte-btn" title="Clear formatting" onclick="rteClear()"
                                        tabindex="-1">✕</button>
                                </div>
                                <div id="abilitiesEditor" contenteditable="true" spellcheck="false"
                                    oninput="updatePreview()" placeholder="List special powers and effects…"></div>
                            </div>
                        </div>

                        <div class="form-checkbox-group">
                            <label>
                                <input type="checkbox" id="formItemAttunement">
                                Requires Attunement
                            </label>
                        </div>
                        <div class="s-content" id="actions-content">
                            <div class="s-form">
                                <button class="s-button" onclick="downloadCard()">💾 Download</button>
                                <button class="s-button" onclick="clearForm()">Clear</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="preview-panel">
                    <div class="preview-header">Live Preview</div>
                    <div class="preview-body">
                        <div class="card rarity-rare" id="preview">
                            <div class="card-name" id="previewName">Sword of Dragonslaying</div>
                            <div class="card-type" id="previewType">Weapon (Rarity: Rare)</div>
                            <div id="previewStats" style="display: none;">
                                <div class="card-stats" id="previewDamage"></div>
                                <div class="card-stats" id="previewDamageType"></div>
                                <div class="card-stats" id="previewProperties"></div>
                                <div class="card-stats" id="previewAC"></div>
                                <div class="card-stats" id="previewArmorType"></div>
                                <div id="previewUses"></div>
                            </div>
                            <div class="card-flavor" id="previewFlavor">A legendary blade forged to slay dragons.</div>
                            <div class="card-abilities" id="previewAbilities">• Against dragons: advantage on attack
                                rolls<br>• On hit: +2d6 additional damage</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Theme system
        const themeSw = document.getElementById('themeSw');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('itemCards-theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        themeSw.querySelector(`button[data-t="${savedTheme}"]`).classList.add('act');

        themeSw.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON') return;
            const theme = e.target.getAttribute('data-t');
            html.setAttribute('data-theme', theme);
            localStorage.setItem('itemCards-theme', theme);
            themeSw.querySelectorAll('button').forEach(btn => btn.classList.remove('act'));
            e.target.classList.add('act');
        });

        function toggleTypeFields() {
            const type = document.getElementById('formItemType').value;

            // Hide all type-specific fields
            document.getElementById('formWeaponFields').style.display = 'none';
            document.getElementById('formArmorFields').style.display = 'none';
            document.getElementById('formConsumableFields').style.display = 'none';

            // Show relevant fields
            if (type === 'Weapon') {
                document.getElementById('formWeaponFields').style.display = 'block';
            } else if (type === 'Armor') {
                document.getElementById('formArmorFields').style.display = 'block';
            } else if (type === 'Consumable' || type === 'Potion') {
                document.getElementById('formConsumableFields').style.display = 'block';
            }
            updatePreview();
        }

        function updatePreview() {
            const name = document.getElementById('formItemName').value || 'Sword of Dragonslaying';
            const type = document.getElementById('formItemType').value || 'Item';
            const rarity = document.getElementById('formItemRarity').value || 'rare';
            const flavor = document.getElementById('formItemFlavor').value || 'A legendary item forged by master craftsmen.';
            // Read rich HTML directly from the contenteditable editor
            const abilitiesHtml = document.getElementById('abilitiesEditor').innerHTML;
            const attunement = document.getElementById('formItemAttunement').checked ? ' - Requires Attunement -' : '';

            const preview = document.getElementById('preview');
            preview.className = `card rarity-${rarity}`;

            document.getElementById('previewName').textContent = name;
            document.getElementById('previewType').textContent = `${type} (Rarity: ${rarity}${attunement})`;
            document.getElementById('previewFlavor').innerHTML = flavor
                .split('\n')
                .map(a => a.trim())
                .filter(a => a)
                .join('<br>');
            // Paste rich HTML straight into preview — formatting is preserved
            document.getElementById('previewAbilities').innerHTML = abilitiesHtml;

            // Update toolbar button active states
            ['bold', 'italic'].forEach(cmd => {
                const btn = document.querySelector(`.rte-btn[title^="${cmd.charAt(0).toUpperCase() + cmd.slice(1)}"]`);
                if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
            });

            // Show/hide stats based on type
            const statsDiv = document.getElementById('previewStats');
            statsDiv.style.display = 'none';

            if (type === 'Weapon') {
                const damage = document.getElementById('formItemDamage').value;
                const damageType = document.getElementById('formItemDamageType').value;
                const properties = document.getElementById('formItemProperties').value;

                if (damage || damageType || properties) {
                    statsDiv.style.display = 'block';
                    document.getElementById('previewDamage').textContent = damage ? `Damage: ${damage}` : '';
                    document.getElementById('previewDamageType').textContent = damageType ? `Type: ${damageType}` : '';
                    document.getElementById('previewProperties').textContent = properties ? `Properties: ${properties}` : '';
                }
            } else if (type === 'Armor') {
                const ac = document.getElementById('formItemAC').value;
                const armorType = document.getElementById('formItemArmorType').value;

                if (ac || armorType) {
                    statsDiv.style.display = 'block';
                    document.getElementById('previewAC').textContent = ac ? `AC: ${ac}` : '';
                    document.getElementById('previewArmorType').textContent = armorType ? `Type: ${armorType}` : '';
                }
            } else if (type === 'Consumable' || type === 'Potion') {
                const uses = parseInt(document.getElementById('formItemUses').value) || 0;
                if (uses > 0) {
                    statsDiv.style.display = 'block';
                    const circles = Array(uses).fill(0).map(() => '<span class="use-circle"></span>').join('');
                    document.getElementById('previewUses').innerHTML = `<div style="margin-top: 6px;">Uses: ${circles}</div>`;
                } else {
                    document.getElementById('previewUses').innerHTML = '';
                }
            }
        }

        function downloadCard() {
            const preview = document.getElementById('preview');
            // 5 cm @ 300 dpi  =  5/2.54 * 300  ≈ 591 px
            const TARGET_PX = 591;
            const scale = TARGET_PX / preview.offsetWidth;
            const bg = getComputedStyle(document.documentElement)
                .getPropertyValue('--surface2').trim() || '#272015';
            html2canvas(preview, { backgroundColor: bg, scale, logging: false }).then(canvas => {
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = (document.getElementById('formItemName').value || 'item-card')
                    .replace(/\s+/g, '-').toLowerCase() + '.png';
                link.click();
            });
        }


        // ── Rich Text Editor helpers ──
        function rteCmd(cmd) {
            document.getElementById('abilitiesEditor').focus();
            document.execCommand(cmd, false, null);
            updatePreview();
        }

        function rteBullet() {
            const ed = document.getElementById('abilitiesEditor');
            ed.focus();
            // If selection is in a UL, toggle it off; otherwise insert bullet
            const inList = document.queryCommandState('insertUnorderedList');
            document.execCommand('insertUnorderedList', false, null);
            if (!inList) {
                // Ensure consistent list styling matches card-abilities ul
                const ul = ed.querySelector('ul:last-of-type');
                if (ul) ul.style.cssText = '';
            }
            updatePreview();
        }

        function rteClear() {
            const ed = document.getElementById('abilitiesEditor');
            ed.focus();
            document.execCommand('selectAll', false, null);
            document.execCommand('removeFormat', false, null);
            // Also strip any remaining UL/LI by unwrapping to plain text
            document.execCommand('insertText', false,
                ed.innerText.replace(/\n{3,}/g, '\n\n').trim());
            updatePreview();
        }

        function clearForm() {
            document.querySelectorAll('input[type="text"], input[type="number"], textarea, select').forEach(el => {
                el.value = '';
            });
            document.querySelectorAll('input[type="checkbox"]').forEach(el => {
                el.checked = false;
            });
            // Clear rich-text editor
            document.getElementById('abilitiesEditor').innerHTML = '';
            updatePreview();
        }

        // Event listeners — exclude the contenteditable (it fires its own oninput)
        document.querySelectorAll('input, textarea, select').forEach(el => {
            el.addEventListener('input', updatePreview);
            el.addEventListener('change', updatePreview);
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                const modal = document.querySelector('.modal-overlay, [id*="modal"][style*="flex"]');
                if (modal) modal.style.display = 'none';
            }
        });
        // Track cursor moves inside editor to update toolbar active states
        document.getElementById('abilitiesEditor').addEventListener('keyup', updatePreview);
        document.getElementById('abilitiesEditor').addEventListener('mouseup', updatePreview);

        updatePreview();
    </script>
</body>

</html>
