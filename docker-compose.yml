services:
  dnd-tools:
    build: .
    image: dnd-tools:latest
    container_name: dnd-tools
    restart: unless-stopped
    ports:
      - "3080:3080"
    volumes:
      # Mount your local pdfs/ folder into the container (read-only).
      # Create the folder first: mkdir -p ./pdfs
      - ./pdfs:/app/pdfs:ro
    # Uncomment to override the port (also change app.js PORT constant):
    # environment:
    #   - PORT=8080

  postgres:
    image: postgres:15-alpine
    container_name: dnd-tools-db
    environment:
      POSTGRES_DB: dndtools
      POSTGRES_USER: dndtools
      POSTGRES_PASSWORD: dndtools123
    ports:
      - "15432:5432"
    volumes:
      - dnd_tools_data:/var/lib/postgresql/data
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dndtools"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dnd_tools_data:
    driver: local
